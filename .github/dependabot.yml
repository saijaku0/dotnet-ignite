version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    assignees:
      - "saijaku0"
    labels:
      - "dependencies"
      - ".net"
    commit-message:
      prefix: "build"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "saijaku0"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"